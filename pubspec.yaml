name: facilite_plus
description: Gestão de empréstimos offline-first.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  # Estado e navegação
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.0

  # Banco local (fonte principal)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1
  path_provider: ^2.1.5

  # Sync manual
  connectivity_plus: ^6.1.4

  # UI
  google_fonts: ^6.2.1
  flutter_lucide: ^1.11.0
  shared_preferences: ^2.5.5

  # Utilitários
  crypto: ^3.0.6
  logging: ^1.3.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
